<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nmmnt. — svatební video &amp; foto</title>
    <meta name="description" content="nmmnt. — svatební video a foto produkce. Robin a Kateřina. Dva pohledy. Jeden příběh.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        @font-face
        {
            font-family: 'GopherText';
            src: url('assets/fonts/GopherText-Heavy.woff2') format('woff2');
            font-weight: 800;
            font-style: normal;
            font-display: swap;
        }

        :root
        {
            --color-primary: #5c1af5;
            --color-bg: #fbf2cf;
            --color-bg-dark: #f0e6b8;
            --color-text: #0a0a0a;
            --color-text-light: #3a3a3a;
            --color-white: #ffffff;
            --color-gray: #888888;

            --font-heading: 'GopherText', 'Georgia', serif;
            --font-body: 'Noto Sans', sans-serif;

            --header-height: 64px;
            --inner-max: 1100px;
            --section-padding: 120px 32px;

            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html
        {
            font-size: 16px;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden;
        }

        body
        {
            font-family: var(--font-body);
            font-weight: 400;
            line-height: 1.7;
            color: var(--color-text);
            background: #000;
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden;
        }

        iframe
        {
            border: none;
            margin: 0;
            padding: 0;
        }

        a { color: inherit; text-decoration: none; }
        img { max-width: 100%; height: auto; display: block; }
        ul { list-style: none; }
        button { border: none; background: none; cursor: pointer; font-family: inherit; color: inherit; }

        /* HEADER */
        #header
        {
            position: fixed; top: 0; left: 0; width: 100%;
            height: var(--header-height); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            padding: 0 24px; transition: background 0.4s ease;
        }

        #header.scrolled
        {
            background: rgba(251, 242, 207, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .header-logo
        {
            position: absolute; left: 50%; transform: translateX(-50%);
            font-family: var(--font-heading); font-weight: 800; font-size: 26px;
            color: var(--color-primary); letter-spacing: -0.02em; z-index: 2;
        }

        .menu-toggle
        {
            position: absolute; left: 24px;
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; font-weight: 500; letter-spacing: 0.06em;
            text-transform: uppercase; color: var(--color-text); z-index: 2;
            transition: color 0.3s ease;
        }

        .menu-toggle:hover { color: var(--color-primary); }

        .menu-toggle-icon
        {
            display: flex; flex-direction: column; gap: 4px; width: 22px;
        }

        .menu-toggle-icon span
        {
            display: block; height: 2px; background: currentColor;
            border-radius: 2px; transition: transform 0.3s ease, opacity 0.3s ease, width 0.3s ease;
        }

        .menu-toggle-icon span:nth-child(2) { width: 16px; }

        .menu-toggle.open .menu-toggle-icon span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .menu-toggle.open .menu-toggle-icon span:nth-child(2) { opacity: 0; }
        .menu-toggle.open .menu-toggle-icon span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

        .header-lang
        {
            position: absolute; right: 24px;
            display: flex; gap: 6px; font-size: 12px;
            font-weight: 500; letter-spacing: 0.06em; z-index: 2;
        }

        .header-lang a { color: var(--color-gray); transition: color 0.3s ease; }
        .header-lang a.active { color: var(--color-text); }
        .header-lang a:hover { color: var(--color-primary); }
        .header-lang span { color: var(--color-gray); }

        /* DROPDOWN MENU */
        .dropdown-menu
        {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(251, 242, 207, 0.97);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            z-index: 999; display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden;
            transition: opacity 0.5s var(--ease-out), visibility 0.5s;
        }

        .dropdown-menu.open { opacity: 1; visibility: visible; }

        .dropdown-menu nav ul
        {
            display: flex; flex-direction: column; align-items: center; gap: 24px;
        }

        .dropdown-menu nav a
        {
            font-family: var(--font-heading); font-weight: 800;
            font-size: clamp(32px, 6vw, 52px); color: var(--color-text);
            letter-spacing: -0.01em; transition: color 0.3s ease;
        }

        .dropdown-menu nav a:hover { color: var(--color-primary); }

        .dropdown-menu .menu-socials
        {
            position: absolute; bottom: 48px; display: flex; gap: 32px;
        }

        .dropdown-menu .menu-socials a
        {
            font-size: 14px; font-weight: 400; color: var(--color-gray);
        }

        .dropdown-menu .menu-socials a:hover { color: var(--color-primary); }

        /* ============================================
           HERO — FIXED FULLSCREEN VIDEO (4:3)
           ============================================ */
        .hero
        {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            z-index: 0;
            background: #000;
        }

        .hero-video
        {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        .hero-video iframe
        {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 75vw;
            min-height: 100vh;
            min-width: 133.33vh;
            transform: translate(-50%, -50%);
            pointer-events: none;
            border: none;
        }

        .hero-overlay
        {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(0, 0, 0, 0.25) 0%,
                rgba(0, 0, 0, 0.0) 35%,
                rgba(0, 0, 0, 0.45) 100%
            );
            z-index: 2;
            pointer-events: none;
        }

        .hero-spacer
        {
            position: relative;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .hero-content
        {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 3;
            width: 100%;
            padding: 0 24px;
            pointer-events: none;
            transition: opacity 0.1s linear;
        }

        .hero-tagline
        {
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: clamp(24px, 4vw, 42px);
            color: var(--color-white);
            letter-spacing: -0.01em;
            margin-bottom: 8px;
            text-shadow: 0 2px 30px rgba(0, 0, 0, 0.4);
        }

        .hero-sub
        {
            font-size: 14px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 32px;
        }

        .hero-scroll-hint
        {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .hero-scroll-hint svg
        {
            animation: scrollBounce 2s ease-in-out infinite;
        }

        @keyframes scrollBounce
        {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(6px); }
        }

        /* ============================================
           CONTENT — scrolls over the fixed video
           ============================================ */
        .content
        {
            position: relative;
            z-index: 10;
        }

        /*
           Gradient: transparent → solid --color-bg
           This is the ONLY place where video shows through.
           After this gradient, everything is solid.
        */
        .content::before
        {
            content: '';
            display: block;
            height: 30vh;
            background: linear-gradient(
                to bottom,
                rgba(251, 242, 207, 0) 0%,
                rgba(251, 242, 207, 0.5) 35%,
                rgba(251, 242, 207, 0.85) 65%,
                rgba(251, 242, 207, 1) 100%
            );
            pointer-events: none;
        }

        /* Every section gets SOLID opaque background */
        .sec
        {
            background: var(--color-bg);
        }

        .section-inner
        {
            max-width: var(--inner-max); margin: 0 auto;
            padding: var(--section-padding);
        }

        .section-label
        {
            font-size: 12px; font-weight: 600; letter-spacing: 0.15em;
            text-transform: uppercase; color: var(--color-primary); margin-bottom: 12px;
        }

        .section-title
        {
            font-family: var(--font-heading); font-weight: 800;
            font-size: clamp(28px, 4.5vw, 48px); line-height: 1.2;
            color: var(--color-text); margin-bottom: 20px; letter-spacing: -0.01em;
        }

        .section-desc
        {
            font-size: clamp(15px, 1.6vw, 17px); font-weight: 300;
            line-height: 1.9; color: var(--color-text-light);
            max-width: 640px; margin-bottom: 56px;
        }

        .about-grid
